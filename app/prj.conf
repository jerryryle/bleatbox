# Bluetooth
CONFIG_BT=y
CONFIG_BT_BROADCASTER=y
CONFIG_BT_OBSERVER=y
CONFIG_BT_EXT_ADV=y
CONFIG_BT_CTLR_ADV_EXT=y
# Two advertising sets: the mesh's non-connectable set + the OTA window's
# connectable set used for SMP-over-BLE.
CONFIG_BT_EXT_ADV_MAX_ADV_SET=2
CONFIG_BT_CTLR_ADV_DATA_LEN_MAX=128
CONFIG_BT_CTLR_SCAN_DATA_LEN_MAX=128

# OTA: become connectable during an update window so an operator can push a
# firmware image over SMP-over-BLE. A per-device name is set at arm time.
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME_DYNAMIC=y
CONFIG_BT_DEVICE_NAME_MAX=24

# SMP / mcumgr over BLE — File System group for `mcumgr fs upload` of the
# image to the SD card, and OS group for `mcumgr reset` as a commit path.
# Image (img_mgmt) group is intentionally NOT used: no MCUboot here.
CONFIG_ZCBOR=y
CONFIG_MCUMGR=y
CONFIG_MCUMGR_TRANSPORT_BT=y
CONFIG_MCUMGR_GRP_FS=y
CONFIG_MCUMGR_GRP_OS=y

# SMP-over-BLE upload tuning (mirrors Zephyr's smp_svr bt.conf).
# REASSEMBLY lets an SMP request span several BLE writes — without it any
# upload chunk larger than one MTU is parsed as a corrupt frame (ECORRUPT).
# MCUMGR_PARAMS reports the buffer size so the host sizes chunks to fit; the
# larger MTU/ACL/data-length and 2475-byte netbuf make the transfer fast
# enough to finish inside the OTA window.
CONFIG_MCUMGR_TRANSPORT_BT_REASSEMBLY=y
CONFIG_MCUMGR_GRP_OS_MCUMGR_PARAMS=y
CONFIG_MCUMGR_TRANSPORT_NETBUF_SIZE=2475
CONFIG_MCUMGR_TRANSPORT_WORKQUEUE_STACK_SIZE=4608
CONFIG_MCUMGR_TRANSPORT_BT_CONN_PARAM_CONTROL=y
CONFIG_BT_L2CAP_TX_MTU=498
CONFIG_BT_BUF_ACL_RX_SIZE=502
CONFIG_BT_BUF_ACL_TX_SIZE=502
CONFIG_BT_CTLR_DATA_LENGTH_MAX=251

# GPIO
CONFIG_GPIO=y

# I2C (LIS2DW12 accelerometer)
CONFIG_I2C=y

# SPI
CONFIG_SPI=y

# ADC (battery voltage monitor via SAADC)
CONFIG_ADC=y

# Sensor subsystem (LIS2DW12 accelerometer)
CONFIG_SENSOR=y
CONFIG_LIS2DW12=y
CONFIG_LIS2DW12_TRIGGER_GLOBAL_THREAD=y
CONFIG_LIS2DW12_WAKEUP=y

# SD card (SDMMC auto-selects SD_STACK -> SDHC)
CONFIG_SDMMC_STACK=y

# Filesystem
CONFIG_FILE_SYSTEM=y
CONFIG_FAT_FILESYSTEM_ELM=y
CONFIG_FS_FATFS_LFN=y
CONFIG_FS_FATFS_LFN_MODE_HEAP=y

# Disk
CONFIG_DISK_ACCESS=y
CONFIG_DISK_DRIVERS=y

# Shell
CONFIG_SHELL=y
CONFIG_SHELL_STACK_SIZE=4096

# Reboot — the `bootloader` shell command reboots into the UF2 bootloader
CONFIG_REBOOT=y

# Logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# Random number generator
CONFIG_ENTROPY_GENERATOR=y
CONFIG_TEST_RANDOM_GENERATOR=n

# USB device descriptor
CONFIG_CDC_ACM_SERIAL_VID=0x2FE3
CONFIG_CDC_ACM_SERIAL_PID=0x0004
CONFIG_CDC_ACM_SERIAL_MANUFACTURER_STRING="BleatBox"
CONFIG_CDC_ACM_SERIAL_PRODUCT_STRING="BleatBox"

# Power management
CONFIG_PM=y
CONFIG_PM_DEVICE=y

# nRF52840 DC-DC converter (board has the required inductor; more
# efficient than the default LDO).  The board devicetree requests
# DCDC mode, but the regulator driver must be enabled to apply it.
CONFIG_REGULATOR=y

# System
# Heap raised from 8 KB to cover mcumgr/zcbor + SMP buffers during an OTA
# window (in addition to the FAT LFN heap).
CONFIG_HEAP_MEM_POOL_SIZE=16384
CONFIG_MAIN_STACK_SIZE=4096

# Stack overflow detection via MPU — zero runtime cost on nRF52840,
# catches corruption from FAT FS and SPI driver stack usage
CONFIG_HW_STACK_PROTECTION=y

# UF2 output for drag-and-drop flashing
CONFIG_BUILD_OUTPUT_UF2=y

# Use flash partition layout from device tree (UF2 bootloader)
CONFIG_USE_DT_CODE_PARTITION=y
