# BleatBox second-stage updater.
#
# Minimal image the UF2 bootloader launches at 0x26000. It reads a staged
# firmware image from the SD card, writes it to the main_app region, then
# chain-loads the main app at 0x3e000.

# Link at code_partition (0x26000) — the board default chosen partition.
CONFIG_USE_DT_CODE_PARTITION=y

# Flash access to the main_app region.
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y

# sys_reboot() — used to retry after a mid-flash failure.
CONFIG_REBOOT=y

# SD card + FAT, to read the staged image.
CONFIG_SPI=y
CONFIG_SDMMC_STACK=y
CONFIG_DISK_ACCESS=y
CONFIG_DISK_DRIVERS=y
CONFIG_FILE_SYSTEM=y
CONFIG_FAT_FILESYSTEM_ELM=y
CONFIG_FS_FATFS_LFN=y
CONFIG_FS_FATFS_LFN_MODE_HEAP=y

# LED status (no console in the field).
CONFIG_GPIO=y

# Keep it small: no Bluetooth, shell, or MPU stack guard (so no MPU state
# is left configured when we hand off to the app).
CONFIG_BT=n
CONFIG_SHELL=n
CONFIG_HW_STACK_PROTECTION=n

# Logging off — there's no console attached in the field anyway. Drop the
# USB CDC console entirely: the updater needs no console, and bringing up
# (then tearing down) USB before the handoff is just risk and flash.
CONFIG_LOG=n
CONFIG_CONSOLE=n
CONFIG_UART_CONSOLE=n
CONFIG_USB_DEVICE_STACK=n

CONFIG_HEAP_MEM_POOL_SIZE=8192
CONFIG_MAIN_STACK_SIZE=4096

# Emit a UF2 for standalone updater flashing; provisioning uses the
# sysbuild-merged image.
CONFIG_BUILD_OUTPUT_UF2=y
